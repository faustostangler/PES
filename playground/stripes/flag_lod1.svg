<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- G-CF-01 vertical bands (20% Green, 60% White, 20% Green) -->
  <rect x="0" y="0" width="160" height="500" fill="#0f3d27"/>
  <rect x="160" y="0" width="480" height="500" fill="#ffffff"/>
  <rect x="640" y="0" width="160" height="500" fill="#0f3d27"/>

  <!-- Metal Gold lines separating Green and White fields (8px width for prominent separation) -->
  <rect x="156" y="0" width="8" height="500" fill="#e6b831"/>
  <rect x="636" y="0" width="8" height="500" fill="#e6b831"/>

  <!-- LOD-1: Majestic Level Bionic Features (Green circuit traces on White field with Gold pads) -->
  <g stroke="#0f3d27" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.9">
    <!-- Left PCB traces extending from the Cross -->
    <path d="M 310, 220 H 260 L 240, 200 H 200" />
    <path d="M 310, 280 H 260 L 240, 300 H 200" />
    <!-- Left trace pads (vias in Gold) -->
    <circle cx="200" cy="200" r="4.5" fill="#e6b831" stroke="none"/>
    <circle cx="200" cy="300" r="4.5" fill="#e6b831" stroke="none"/>

    <!-- Right PCB traces extending from the Cross -->
    <path d="M 490, 220 H 540 L 560, 200 H 600" />
    <path d="M 490, 280 H 540 L 560, 300 H 600" />
    <!-- Right trace pads (vias in Gold) -->
    <circle cx="600" cy="200" r="4.5" fill="#e6b831" stroke="none"/>
    <circle cx="600" cy="300" r="4.5" fill="#e6b831" stroke="none"/>

    <!-- Scanning Reticle Rings in Green/Gold -->
    <circle cx="400" cy="250" r="120" stroke="#e6b831" stroke-dasharray="6 4" stroke-width="1.5" />
    <circle cx="400" cy="250" r="100" stroke="#0f3d27" stroke-dasharray="2 2" stroke-width="1.5" opacity="0.6" />
  </g>

  <!-- Central Charge: Stylized Bionic Greek Cross (Yellow/Gold body with Deep Green outline for high contrast) -->
  <path d="M 370, 160 H 430 V 220 H 490 V 280 H 430 V 340 H 370 V 280 H 310 V 220 H 370 Z" fill="#e6b831" stroke="#0f3d27" stroke-width="5" stroke-linejoin="round"/>

  <!-- Microchip CPU Central Hub inside the Cross (Green Circle) -->
  <circle cx="400" cy="250" r="20" fill="#0f3d27" stroke="#e6b831" stroke-width="2"/>
  <circle cx="400" cy="250" r="12" fill="#e6b831"/>
  <circle cx="400" cy="250" r="4" fill="#ffffff"/>

  <!-- Central Hub Connections (Microchip Pins in Gold) -->
  <g stroke="#e6b831" stroke-width="2" opacity="0.8">
    <line x1="400" y1="220" x2="400" y2="230"/>
    <line x1="400" y1="280" x2="400" y2="270"/>
    <line x1="370" y1="250" x2="380" y2="250"/>
    <line x1="430" y1="250" x2="420" y2="250"/>
  </g>
</svg>