<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="100%" height="100%">
  <!-- Vertical Flag Layout for 32px -->
  <rect x="0" y="0" width="6" height="32" fill="#0f3d27"/>
  <rect x="6" y="0" width="20" height="32" fill="#ffffff"/>
  <rect x="26" y="0" width="6" height="32" fill="#0f3d27"/>

  <!-- Metal Gold lines separating Green and White fields -->
  <rect x="5" y="0" width="1" height="32" fill="#e6b831"/>
  <rect x="26" y="0" width="1" height="32" fill="#e6b831"/>

  <!-- LOD-3: Geometric Primitive Substitution (Green circle representing eye/cross container) -->
  <circle cx="16" cy="16" r="7" fill="#0f3d27"/>

  <!-- Yellow/Gold medical cross inside the green circle -->
  <path d="M 15, 12 H 17 V 15 H 20 V 17 H 17 V 20 H 15 V 17 H 12 V 15 H 15 Z" fill="#e6b831"/>
</svg>