<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Heater Shield Base Canvas -->
  <path d="M 256, 32 C 384, 32 448, 64 448, 128 C 448, 288 384, 416 256, 480 C 128, 416 64, 288 64, 128 C 64, 64 128, 32 256, 32 Z" fill="#0f3d27" stroke="#e6b831" stroke-width="4"/>

  <!-- LOD-1: Majestic Level Bionic Features (Microchip Circuit Traces) -->
  <g stroke="#e6b831" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.85">
    <!-- Left PCB traces -->
    <path d="M 128, 256 H 90 L 70, 236 H 50" />
    <path d="M 128, 256 H 100 L 80, 276 H 55" />
    <circle cx="50" cy="236" r="4" fill="#e6b831" stroke="none"/>
    <circle cx="55" cy="276" r="4" fill="#e6b831" stroke="none"/>

    <!-- Right PCB traces -->
    <path d="M 384, 256 H 422 L 442, 236 H 462" />
    <path d="M 384, 256 H 412 L 432, 276 H 457" />
    <circle cx="462" cy="236" r="4" fill="#e6b831" stroke="none"/>
    <circle cx="457" cy="276" r="4" fill="#e6b831" stroke="none"/>

    <!-- Scanning Reticle Rings -->
    <circle cx="256" cy="256" r="110" stroke="#e6b831" stroke-dasharray="8 6" stroke-width="1.5"/>
    <circle cx="256" cy="256" r="92" stroke="#ffffff" stroke-dasharray="2 4" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- Eye Sclera (White base shape) -->
  <path d="M 128, 256 C 128, 256 192, 160 256, 160 C 320, 160 384, 256 384, 256 C 384, 256 320, 352 256, 352 C 192, 352 128, 256 128, 256 Z" fill="#ffffff" stroke="#e6b831" stroke-width="4"/>

  <!-- Iris (Gold circular body representing the bionic camera sensor) -->
  <circle cx="256" cy="256" r="64" fill="#e6b831" stroke="#4d6673" stroke-width="3"/>

  <!-- Microchip Pins on Iris Edge -->
  <g stroke="#4d6673" stroke-width="2" opacity="0.75">
    <line x1="256" y1="192" x2="256" y2="198"/>
    <line x1="256" y1="320" x2="256" y2="314"/>
    <line x1="192" y1="256" x2="198" y2="256"/>
    <line x1="320" y1="256" x2="314" y2="256"/>
    <line x1="211" y1="211" x2="216" y2="216"/>
    <line x1="301" y1="301" x2="296" y2="296"/>
    <line x1="211" y1="301" x2="216" y2="296"/>
    <line x1="301" y1="211" x2="296" y2="216"/>
  </g>

  <!-- Pupil (Dark Slate central core) -->
  <circle cx="256" cy="256" r="32" fill="#4d6673"/>

  <!-- Central Medical Greek Cross (Achromatic White for maximum contrast and clinical signifier) -->
  <path d="M 251, 240 H 261 V 251 H 272 V 261 H 261 V 272 H 251 V 261 H 240 V 251 H 251 Z" fill="#ffffff"/>
</svg>