<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
  <!-- G-CF-01 vertical bands -->
  <rect x="0" y="0" width="160" height="500" fill="#0f3d27"/>
  <rect x="160" y="0" width="480" height="500" fill="#ffffff"/>
  <rect x="640" y="0" width="160" height="500" fill="#0f3d27"/>

  <!-- Metal Gold lines separating Green and White fields -->
  <rect x="157" y="0" width="6" height="500" fill="#e6b831"/>
  <rect x="637" y="0" width="6" height="500" fill="#e6b831"/>

  <!-- LOD-2: Simplified PCB trace lines -->
  <g stroke="#0f3d27" stroke-width="4" fill="none" stroke-linecap="round">
    <path d="M 310, 250 H 210" />
    <path d="M 490, 250 H 590" />
  </g>

  <!-- Central Cross (Yellow/Gold with Green stroke) -->
  <path d="M 370, 160 H 430 V 220 H 490 V 280 H 430 V 340 H 370 V 280 H 310 V 220 H 370 Z" fill="#e6b831" stroke="#0f3d27" stroke-width="5" stroke-linejoin="round"/>

  <!-- Center green pin circle -->
  <circle cx="400" cy="250" r="12" fill="#0f3d27"/>
</svg>